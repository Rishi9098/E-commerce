{% extends 'base.html' %}

{% block title %}Delete Product - ShopHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white py-3">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle-fill"></i> Confirm Deletion</h4>
            </div>
            <div class="card-body text-center py-5">
                <i class="bi bi-trash3 text-danger" style="font-size: 4rem;"></i>
                <h5 class="mt-3">Are you sure you want to delete?</h5>
                <p class="text-muted fs-5">"<strong>{{ product.name }}</strong>"</p>
                <p class="text-muted small">This action cannot be undone. The product will be permanently removed.</p>
                <div class="d-flex gap-3 justify-content-center mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg">
                            <i class="bi bi-trash"></i> Yes, Delete
                        </button>
                    </form>
                    <a href="{% url 'seller_dashboard' %}" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-x"></i> Cancel
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
